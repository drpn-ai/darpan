<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Ticket #9 Mapping Flow - Minimal Technical</title>
  <desc id="desc">Minimal technical monochrome mockup with generous whitespace for mapping step-card flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#f1f1f1"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#ececec" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect width="1600" height="980" fill="url(#grid)"/>

  <text x="92" y="88" fill="#4e4e4e" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13">[ticket_09] mapping_step_card</text>
  <text x="92" y="152" fill="#101010" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="56" font-weight="700">Simple mapping flow</text>

  <line x1="92" y1="202" x2="560" y2="202" stroke="#262626" stroke-width="2"/>
  <circle cx="560" cy="202" r="6" fill="#262626"/>
  <circle cx="652" cy="202" r="6" fill="#262626"/>
  <circle cx="744" cy="202" r="6" fill="#bdbdbd"/>
  <circle cx="836" cy="202" r="6" fill="#bdbdbd"/>
  <text x="860" y="208" fill="#666666" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">step_2_of_4</text>

  <rect x="244" y="266" width="760" height="524" rx="10" fill="#ffffff" stroke="#dadada" filter="url(#soft)"/>

  <text x="292" y="326" fill="#8a8a8a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">active_step // system_1_config</text>
  <text x="292" y="378" fill="#101010" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="38" font-weight="700">Configure source</text>

  <text x="292" y="432" fill="#6a6a6a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13">source_system</text>
  <rect x="292" y="446" width="300" height="58" rx="8" fill="#fafafa" stroke="#dbdbdb"/>
  <text x="314" y="482" fill="#101010" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="18">Shopify</text>

  <text x="620" y="432" fill="#6a6a6a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13">file_type</text>
  <rect x="620" y="446" width="180" height="58" rx="8" fill="#fafafa" stroke="#dbdbdb"/>
  <text x="642" y="482" fill="#101010" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="18">JSON</text>

  <text x="292" y="548" fill="#6a6a6a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13">id_expression</text>
  <rect x="292" y="562" width="508" height="58" rx="8" fill="#fafafa" stroke="#dbdbdb"/>
  <text x="314" y="598" fill="#101010" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="18">productId</text>

  <text x="292" y="664" fill="#6a6a6a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13">schema_file</text>
  <rect x="292" y="678" width="508" height="58" rx="8" fill="#fafafa" stroke="#dbdbdb"/>
  <text x="314" y="714" fill="#101010" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="16">shopify-products.schema.json</text>

  <text x="292" y="760" fill="#8a8a8a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">validation: progression blocked until required fields are complete</text>

  <rect x="856" y="678" width="110" height="48" rx="8" fill="#ffffff" stroke="#bcbcbc"/>
  <text x="890" y="708" fill="#2f2f2f" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="14" font-weight="700">back</text>

  <rect x="856" y="736" width="110" height="48" rx="8" fill="#101010"/>
  <text x="874" y="766" fill="#ffffff" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="14" font-weight="700">continue</text>

  <text x="1088" y="370" fill="#7a7a7a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">review_buffer</text>
  <text x="1088" y="398" fill="#2a2a2a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="14">mapping_name: product-id-sync-v3</text>
  <text x="1088" y="424" fill="#2a2a2a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="14">id_generation: sanitized+suffix</text>
  <text x="1088" y="450" fill="#2a2a2a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="14">legacy_fallback: available</text>
</svg>
