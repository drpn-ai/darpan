<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Ticket #9 Mapping Flow - Minimal Technical Dark</title>
  <desc id="desc">Dark-mode minimal technical mockup with explicit step execution alignment for mapping flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#171717" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect width="1600" height="980" fill="url(#grid)"/>

  <text x="96" y="84" fill="#8d8d8d" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13">[ticket_09] mapping_step_card.dark</text>
  <text x="96" y="146" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="54" font-weight="700">Clear task flow</text>

  <text x="96" y="214" fill="#b2b2b2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13">execution: 01 identity -> 02 system_1 -> 03 system_2 -> 04 review_submit</text>
  <line x1="250" y1="246" x2="1250" y2="246" stroke="#2b2b2b" stroke-width="2"/>

  <circle cx="250" cy="246" r="13" fill="#121212" stroke="#7f7f7f"/>
  <circle cx="583" cy="246" r="13" fill="#f2f2f2"/>
  <circle cx="916" cy="246" r="13" fill="#121212" stroke="#7f7f7f"/>
  <circle cx="1250" cy="246" r="13" fill="#121212" stroke="#7f7f7f"/>

  <text x="228" y="280" fill="#848484" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">01</text>
  <text x="560" y="280" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">02</text>
  <text x="893" y="280" fill="#848484" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">03</text>
  <text x="1227" y="280" fill="#848484" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">04</text>

  <rect x="420" y="330" width="760" height="520" rx="10" fill="#101010" stroke="#2a2a2a" filter="url(#soft)"/>

  <text x="472" y="388" fill="#8a8a8a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">active_step // 02_system_1_config</text>
  <text x="472" y="438" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="36" font-weight="700">Configure source</text>

  <text x="472" y="486" fill="#9a9a9a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">source_system</text>
