  <text x="416" y="800" fill="#c8c8c8" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="15">match=9820  only_file1=142  only_file2=58  diff=200</text>
  <text x="416" y="828" fill="#c8c8c8" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="15">artifact: 20260310-114200-product-id-sync-v3.json</text>
  <text x="416" y="856" fill="#c8c8c8" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="15">actions: view | download | delete | rerun</text>

  <rect x="1076" y="768" width="128" height="48" rx="8" fill="#1a1a1a" stroke="#8e8e8e"/>
  <text x="1114" y="797" fill="#d0d0d0" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13" font-weight="700">back</text>

