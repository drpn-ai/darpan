<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Settings Page - Dark Minimal Technical</title>
  <desc id="desc">Mockup for Darpan Settings page with dark monochrome style, open space, and clear configuration task flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#171717" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect width="1600" height="980" fill="url(#grid)"/>

  <text x="92" y="84" fill="#8d8d8d" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13">[settings] configuration_center.dark</text>
  <text x="92" y="146" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="54" font-weight="700">Settings</text>

  <text x="92" y="214" fill="#b2b2b2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13">task_flow: select_module -> configure_fields -> validate_connection -> save_profile</text>
  <line x1="310" y1="246" x2="1250" y2="246" stroke="#2b2b2b" stroke-width="2"/>

  <circle cx="310" cy="246" r="13" fill="#f2f2f2"/>
  <circle cx="623" cy="246" r="13" fill="#121212" stroke="#7f7f7f"/>
  <circle cx="936" cy="246" r="13" fill="#121212" stroke="#7f7f7f"/>
  <circle cx="1250" cy="246" r="13" fill="#121212" stroke="#7f7f7f"/>

  <text x="286" y="280" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">01</text>
  <text x="600" y="280" fill="#848484" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">02</text>
  <text x="913" y="280" fill="#848484" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">03</text>
  <text x="1227" y="280" fill="#848484" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">04</text>

  <rect x="92" y="334" width="520" height="548" rx="10" fill="#101010" stroke="#2a2a2a" filter="url(#soft)"/>
  <text x="136" y="388" fill="#8a8a8a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">active_step // 01_select_module</text>
  <text x="136" y="436" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="34" font-weight="700">Choose config area</text>

  <rect x="136" y="470" width="432" height="62" rx="8" fill="#161616" stroke="#303030"/>
  <text x="160" y="507" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="16">NetSuite Auth</text>
  <text x="472" y="507" fill="#a5a5a5" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13">ready</text>

  <rect x="136" y="544" width="432" height="62" rx="8" fill="#141414" stroke="#2a2a2a"/>
  <text x="160" y="581" fill="#c8c8c8" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="16">NetSuite Endpoints</text>

  <rect x="136" y="618" width="432" height="62" rx="8" fill="#141414" stroke="#2a2a2a"/>
  <text x="160" y="655" fill="#c8c8c8" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="16">SFTP Settings</text>

  <rect x="136" y="692" width="432" height="62" rx="8" fill="#141414" stroke="#2a2a2a"/>
  <text x="160" y="729" fill="#c8c8c8" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="16">Read DB Settings</text>

  <rect x="136" y="766" width="432" height="62" rx="8" fill="#141414" stroke="#2a2a2a"/>
  <text x="160" y="803" fill="#c8c8c8" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="16">LLM Settings</text>

  <rect x="656" y="334" width="852" height="548" rx="10" fill="#101010" stroke="#2a2a2a" filter="url(#soft)"/>
  <text x="704" y="388" fill="#8a8a8a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">module_preview // netsuite_auth</text>
  <text x="704" y="436" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="34" font-weight="700">Configure profile</text>

  <text x="704" y="480" fill="#9a9a9a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">auth_config_id</text>
  <rect x="704" y="494" width="340" height="56" rx="8" fill="#161616" stroke="#303030"/>
  <text x="724" y="528" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="16">NS_AUTH_MAIN</text>

  <text x="1068" y="480" fill="#9a9a9a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">auth_method</text>
  <rect x="1068" y="494" width="220" height="56" rx="8" fill="#161616" stroke="#303030"/>
  <text x="1088" y="528" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="16">OAUTH2_M2M_JWT</text>

  <text x="704" y="598" fill="#9a9a9a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">client_id</text>
  <rect x="704" y="612" width="584" height="56" rx="8" fill="#161616" stroke="#303030"/>
  <text x="724" y="646" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="16">ns-client-prod-01</text>

  <text x="704" y="716" fill="#9a9a9a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">token_url</text>
  <rect x="704" y="730" width="584" height="56" rx="8" fill="#161616" stroke="#303030"/>
  <text x="724" y="764" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="15">https://account.netsuite.com/services/rest/auth/oauth2/v1/token</text>

  <rect x="1308" y="730" width="160" height="48" rx="8" fill="#1a1a1a" stroke="#8e8e8e"/>
  <text x="1354" y="759" fill="#d0d0d0" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13" font-weight="700">validate</text>

  <rect x="1308" y="786" width="160" height="48" rx="8" fill="#f2f2f2"/>
  <text x="1362" y="815" fill="#111111" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13" font-weight="700">save</text>

  <text x="704" y="836" fill="#9f9f9f" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">status: validation ready | encrypted storage path active | fallback to classic screen available</text>
</svg>
