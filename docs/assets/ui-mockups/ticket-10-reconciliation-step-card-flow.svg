  <text x="1114" y="853" fill="#111111" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="13" font-weight="700">run</text>

  <text x="1270" y="784" fill="#9a9a9a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">fallback=classic_ui_available</text>
  <text x="1270" y="812" fill="#9a9a9a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">json_view_handoff=preserved</text>
  <text x="1270" y="840" fill="#9a9a9a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">download_delete_behavior=preserved</text>
