  <text x="1242" y="522" fill="#9f9f9f" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">validation_gate=required_fields</text>
  <text x="1242" y="548" fill="#9f9f9f" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">fallback=classic_ui_available</text>
