name: Enforce UI Ownership Boundary

on:
  push:
  pull_request:

jobs:
  block-backend-ui-work:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block custom UI/PWA changes in backend repo
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA" | tail -n 1)"
            fi
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          if [[ -z "$CHANGED_FILES" ]]; then
            exit 0
          fi

          # Backend keeps service contracts/processing only.
          # UI/PWA work belongs in the darpan-ui repository.
          BLOCKED_FILES="$(printf '%s\n' "$CHANGED_FILES" | grep -E '^(screen/|template/|theme-library/|docs/assets/ui-mockups/|docs/reconciliation/ui-mockups\.md$)' || true)"
          if [[ -z "$BLOCKED_FILES" ]]; then
            exit 0
          fi

          echo "Custom UI/PWA changes are not allowed in darpan-backend."
          echo "Move these file changes to darpan-ui:"
          printf '%s\n' "$BLOCKED_FILES"
          exit 1
