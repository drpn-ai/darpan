<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Rule Engine Workbench Mockup</title>
  <desc id="desc">Mockup of a rule engineering workspace with rule list, editor, and live test output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <rect x="44" y="34" width="1512" height="96" rx="24" fill="url(#hero)" filter="url(#soft)"/>
  <text x="82" y="80" fill="#ffffff" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="34" font-weight="700">Rule Engine Workbench</text>
  <text x="82" y="110" fill="#d1fae5" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="18">Manage rule sets, edit DRL safely, and validate behavior before runtime execution.</text>

  <rect x="64" y="166" width="402" height="772" rx="20" fill="#ffffff" filter="url(#soft)"/>
  <text x="96" y="212" fill="#0f172a" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="24" font-weight="700">Rule Sets</text>

  <rect x="96" y="238" width="338" height="46" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="114" y="267" fill="#64748b" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="14">Search by ruleSetId or name</text>

  <rect x="96" y="306" width="338" height="96" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="116" y="338" fill="#1e3a8a" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="16" font-weight="700">inventory-comparison-v4</text>
  <text x="116" y="363" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="13">Version 4.1 | Updated Mar 10</text>
  <rect x="324" y="326" width="88" height="28" rx="14" fill="#dcfce7"/>
  <text x="350" y="345" fill="#166534" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12" font-weight="700">Active</text>

  <rect x="96" y="414" width="338" height="96" rx="12" fill="#ffffff" stroke="#dbeafe"/>
  <text x="116" y="446" fill="#0f172a" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="16" font-weight="700">returns-exception-v2</text>
  <text x="116" y="471" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="13">Version 2.3 | Updated Mar 8</text>
  <rect x="320" y="434" width="92" height="28" rx="14" fill="#fef3c7"/>
  <text x="342" y="453" fill="#92400e" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12" font-weight="700">Draft</text>

  <rect x="96" y="522" width="338" height="96" rx="12" fill="#ffffff" stroke="#dbeafe"/>
  <text x="116" y="554" fill="#0f172a" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="16" font-weight="700">price-drift-alert-v1</text>
  <text x="116" y="579" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="13">Version 1.5 | Updated Mar 7</text>

  <rect x="96" y="656" width="338" height="52" rx="10" fill="#0f766e"/>
  <text x="190" y="689" fill="#ffffff" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="17" font-weight="700">Create Rule Set</text>

  <rect x="96" y="720" width="338" height="52" rx="10" fill="#ffffff" stroke="#94a3b8"/>
  <text x="196" y="753" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="17" font-weight="700">Clone Selected</text>

  <rect x="490" y="166" width="690" height="520" rx="20" fill="#ffffff" filter="url(#soft)"/>
  <text x="522" y="212" fill="#0f172a" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="24" font-weight="700">Rule Editor</text>

  <rect x="522" y="236" width="626" height="44" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="540" y="264" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="14">Rule name: High variance mismatch detector</text>

  <rect x="522" y="296" width="626" height="348" rx="12" fill="#0b1220"/>
  <text x="548" y="332" fill="#93c5fd" font-family="'IBM Plex Mono','Source Code Pro',monospace" font-size="14">rule "Flag SKU quantity variance"</text>
  <text x="548" y="358" fill="#f8fafc" font-family="'IBM Plex Mono','Source Code Pro',monospace" font-size="14">when</text>
  <text x="548" y="384" fill="#86efac" font-family="'IBM Plex Mono','Source Code Pro',monospace" font-size="14">  $item : InventoryFact(variancePct &gt; 8.0)</text>
  <text x="548" y="410" fill="#f8fafc" font-family="'IBM Plex Mono','Source Code Pro',monospace" font-size="14">then</text>
  <text x="548" y="436" fill="#fcd34d" font-family="'IBM Plex Mono','Source Code Pro',monospace" font-size="14">  result.setClassification("VARIANCE_ALERT");</text>
  <text x="548" y="462" fill="#fcd34d" font-family="'IBM Plex Mono','Source Code Pro',monospace" font-size="14">  result.addReason("Variance above threshold");</text>
  <text x="548" y="488" fill="#f8fafc" font-family="'IBM Plex Mono','Source Code Pro',monospace" font-size="14">end</text>

  <rect x="522" y="656" width="176" height="42" rx="10" fill="#0f766e"/>
  <text x="570" y="683" fill="#ffffff" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="16" font-weight="700">Save Draft</text>

  <rect x="710" y="656" width="196" height="42" rx="10" fill="#ffffff" stroke="#94a3b8"/>
  <text x="758" y="683" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="16" font-weight="700">Compile Rule Set</text>

  <rect x="918" y="656" width="230" height="42" rx="10" fill="#ffffff" stroke="#0ea5e9"/>
  <text x="968" y="683" fill="#0369a1" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="16" font-weight="700">Run Verification Test</text>

  <rect x="1204" y="166" width="332" height="772" rx="20" fill="#ffffff" filter="url(#soft)"/>
  <text x="1236" y="212" fill="#0f172a" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="24" font-weight="700">Live Validation</text>

  <rect x="1236" y="238" width="268" height="44" rx="10" fill="#dcfce7"/>
  <text x="1254" y="266" fill="#166534" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="14" font-weight="700">Syntax check passed</text>

  <rect x="1236" y="294" width="268" height="44" rx="10" fill="#dcfce7"/>
  <text x="1254" y="322" fill="#166534" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="14" font-weight="700">Compilation complete</text>

  <rect x="1236" y="350" width="268" height="44" rx="10" fill="#fef3c7"/>
  <text x="1254" y="378" fill="#92400e" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="14" font-weight="700">1 rule in draft mode</text>

  <rect x="1236" y="426" width="268" height="260" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1254" y="458" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="14" font-weight="600">Test Output</text>
  <text x="1254" y="486" fill="#64748b" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12">Input batch: inventory_10k.json</text>
  <text x="1254" y="509" fill="#64748b" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12">Rules evaluated: 14</text>
  <text x="1254" y="532" fill="#64748b" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12">Alerts produced: 123</text>
  <text x="1254" y="555" fill="#64748b" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12">Top reason: variance &gt; threshold</text>
  <text x="1254" y="578" fill="#64748b" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12">Execution time: 00:00:02.4</text>

  <rect x="1236" y="708" width="268" height="52" rx="10" fill="#ffffff" stroke="#94a3b8"/>
  <text x="1312" y="741" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="17" font-weight="700">View Full Logs</text>

  <rect x="490" y="704" width="690" height="234" rx="20" fill="#ffffff" filter="url(#soft)"/>
  <text x="522" y="748" fill="#0f172a" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="24" font-weight="700">Execution Timeline</text>

  <line x1="548" y1="804" x2="1128" y2="804" stroke="#cbd5e1" stroke-width="4"/>
  <circle cx="548" cy="804" r="10" fill="#0ea5e9"/>
  <circle cx="706" cy="804" r="10" fill="#0ea5e9"/>
  <circle cx="864" cy="804" r="10" fill="#0ea5e9"/>
  <circle cx="1022" cy="804" r="10" fill="#10b981"/>
  <circle cx="1128" cy="804" r="10" fill="#10b981"/>

  <text x="528" y="838" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12">Parse</text>
  <text x="680" y="838" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12">Validate</text>
  <text x="835" y="838" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12">Compile</text>
  <text x="990" y="838" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12">Dry Test</text>
  <text x="1103" y="838" fill="#334155" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="12">Promote</text>
</svg>
