  <text x="82" y="80" fill="#ffffff" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="34" font-weight="700">Mapping Studio</text>
  <text x="82" y="110" fill="#dbeafe" font-family="'IBM Plex Sans','Source Sans Pro','Helvetica Neue',sans-serif" font-size="18">Create and validate cross-system ID mappings with instant schema hints.</text>

