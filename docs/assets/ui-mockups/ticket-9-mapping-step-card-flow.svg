  <text x="492" y="535" fill="#f2f2f2" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="17">Shopify</text>

  <text x="790" y="486" fill="#9a9a9a" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">file_type</text>
